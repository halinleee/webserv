server 9090

	client_max_body_size 1000000
	error_page 400 /errors/400.html
	keepalive_timeout 75

	location /
		root /www/site1
		index index.html

	location /files
		root /files/root
		autoindex on

	location /upload
		methods POST
		upload_dir /uploads

	location /old_stuff
		return 301 /files
		methods GET

	location /cgi_bin
		root /home/gajeon/gajeon/5/webserv/src/cgi/
		methods GET POST
		cgi_ext .py /opt/pyenv/versions/3.13.1/bin/python3
end



