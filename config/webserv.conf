server 8080

	client_max_body_size 10000000
	error_page 404 /errors/404.html
	
	location /
		root ./www/site1
		index index.html
		methods GET

	location /files
		root ./www/site1
		autoindex on
 
	location /upload
		methods POST
		upload_dir /uploads

	location /old_stuff
		return /files
		methods GET

	location /cgi_bin
		root /cgi_bin
		methods GET POST
		cgi_ext .py /
end

server 1234

	client_max_body_size 65530
	error_page 404 /errors/404.html
	
	location /
		root ./www/site1
		index index.html
		methods GET POST DELETE

	location /files
		root ./www/site1/files
		autoindex on
		methods GET

	location /upload
		methods POST
		upload_dir /uploads

	location /old_stuff
		return /files
		methods GET

	location /cgi_bin
		root /cgi_bin
		methods GET POST
		cgi_ext .py /
end