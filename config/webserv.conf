

server 8080
	client_max_body_size 10000000
	error_page 404 /errors/404.html
	error_page 405 /errors/405.html

	location /
		root ./www/site1
		index index.html
		methods GET POST DELETE

	location /files
		root ./www/site1/files
		autoindex on
		methods GET

	location /upload
		methods POST
		upload_dir ./uploads

	location /redir
		return 301 /files
		methods GET

	location /cgi-bin
		root ./cgi-bin
		methods GET POST
		cgi_ext .py /
end

